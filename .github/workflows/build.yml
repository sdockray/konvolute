name: Build Konvolute

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-macos:
    name: Build macOS (Universal Binary)
    runs-on: macos-14
    steps:
      - name: Download openFrameworks 0.12.1
        run: |
          curl -L -o of.tar.gz https://github.com/openframeworks/openFrameworks/releases/download/0.12.1/of_v0.12.1_osx_release.tar.gz
          tar -xzf of.tar.gz
          mv of_v0.12.1_osx_release/* .
          rm -rf of_v0.12.1_osx_release of.tar.gz

      - name: Checkout external addon ofxJSON
        uses: actions/checkout@v4
        with:
          repository: jefftimesten/ofxJSON
          path: addons/ofxJSON

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          path: apps/myApps/Konvolute

      - name: Generate Xcode project
        run: |
          chmod +x ./projectGenerator/projectGenerator.app/Contents/Resources/app/app/projectGenerator
          ./projectGenerator/projectGenerator.app/Contents/Resources/app/app/projectGenerator -o"." -p"osx" "apps/myApps/Konvolute"

      - name: Compile macOS App
        run: |
          cd apps/myApps/Konvolute
          chmod +x build_release.sh
          ./build_release.sh

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Konvolute_macOS
          path: apps/myApps/Konvolute/bin/Konvolute.zip

  build-windows:
    name: Build Windows (PC)
    runs-on: windows-latest
    steps:
      - name: Download openFrameworks 0.12.1
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/openframeworks/openFrameworks/releases/download/0.12.1/of_v0.12.1_vs_64_release.zip" -OutFile "of.zip"
          Expand-Archive -Path "of.zip" -DestinationPath "temp_of"
          Get-ChildItem -Path "temp_of\of_v*" | Get-ChildItem | Move-Item -Destination "."
          Remove-Item -Recurse -Force temp_of, of.zip

      - name: Checkout external addon ofxJSON
        uses: actions/checkout@v4
        with:
          repository: jefftimesten/ofxJSON
          path: addons/ofxJSON

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          path: apps/myApps/Konvolute

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate Visual Studio project
        shell: pwsh
        run: |
          ./projectGenerator/resources/app/app/projectGenerator.exe -o"." -p"vs" "apps/myApps/Konvolute"

      - name: Build Windows App
        run: |
          msbuild apps/myApps/Konvolute/Konvolute.sln /p:Configuration=Release /p:Platform=x64

      - name: Create Windows Release Zip
        shell: pwsh
        run: |
          cd apps/myApps/Konvolute/bin
          Compress-Archive -Path * -DestinationPath ../../../../Konvolute_Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Konvolute_Windows
          path: Konvolute_Windows.zip
